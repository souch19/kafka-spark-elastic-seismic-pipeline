# ===================================================================
# Pipeline Logstash : Kafka -> Transformation -> Elasticsearch
#
# Ce pipeline lit les evenements sismiques du topic Kafka,
# les enrichit (geo_point, classification de severite),
# et les indexe dans Elasticsearch.
# ===================================================================

input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics            => ["earthquakes"]
    group_id          => "logstash-earthquake-consumer"
    codec             => "json"
    auto_offset_reset => "earliest"
    consumer_threads  => 1
    decorate_events   => "basic"
  }
}

filter {
  # On utilise le champ 'time' de l'evenement comme timestamp principal
  # pour que les series temporelles dans Kibana soient correctes
  date {
    match  => ["time", "ISO8601"]
    target => "@timestamp"
  }

  # Construction d'un champ geo_point a partir de la latitude et longitude
  # C'est necessaire pour la visualisation cartographique dans Kibana Maps
  if [latitude] and [longitude] {
    mutate {
      add_field => {
        "[location][lat]" => "%{latitude}"
        "[location][lon]" => "%{longitude}"
      }
    }
    mutate {
      convert => {
        "[location][lat]" => "float"
        "[location][lon]" => "float"
      }
    }
  }

  # Classification automatique de la severite basee sur la magnitude
  # Permet de filtrer facilement dans Kibana (ex: n'afficher que les "major")
  if [magnitude] {
    if [magnitude] >= 7 {
      mutate { add_field => { "severity" => "major" } }
    } else if [magnitude] >= 5 {
      mutate { add_field => { "severity" => "moderate" } }
    } else if [magnitude] >= 3 {
      mutate { add_field => { "severity" => "light" } }
    } else {
      mutate { add_field => { "severity" => "minor" } }
    }
  }

  # Nettoyage des metadonnees Kafka qui encombrent l'index
  mutate {
    remove_field => ["@version", "[event][original]", "event"]
  }
}

output {
  elasticsearch {
    hosts       => ["http://elasticsearch:9200"]
    index       => "earthquakes"
    document_id => "%{id}"    # Garantit l'idempotence (pas de doublons)
    action      => "index"
  }

  # Affiche un point par evenement indexe, pratique pour suivre la progression
  stdout {
    codec => dots
  }
}